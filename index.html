<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Muhammad Wildan Septiano - Full Stack Developer</title>
    <meta
      name="title"
      content="Muhammad Wildan Septiano - Full Stack Developer"
    />
    <meta
      name="description"
      content="Portfolio of Muhammad Wildan Septiano, a Full Stack Developer specializing in Vue.js, Laravel, and modern web development. Explore my projects, skills, and experience."
    />
    <meta
      name="keywords"
      content="Muhammad Wildan Septiano, Full Stack Developer, Web Developer, Vue.js Developer, Laravel Developer, Portfolio, Software Engineer"
    />
    <meta name="author" content="Muhammad Wildan Septiano" />

    <!-- Deklarasi Robots agar di Index -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://wlsedev.netlify.app/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wlsedev.netlify.app/" />
    <meta
      property="og:title"
      content="Muhammad Wildan Septiano - Full Stack Developer"
    />
    <meta
      property="og:description"
      content="Portfolio of Muhammad Wildan Septiano, a Full Stack Developer specializing in Vue.js, Laravel, and modern web development."
    />
    <meta
      property="og:image"
      content="https://wlsedev.netlify.app/assets/banner-web-anda.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://wlsedev.netlify.app/" />
    <meta
      property="twitter:title"
      content="Muhammad Wildan Septiano - Full Stack Developer"
    />
    <meta
      property="twitter:description"
      content="Portfolio of Muhammad Wildan Septiano, a Full Stack Developer specializing in Web Development."
    />
    <meta
      property="twitter:image"
      content="https://wlsedev.netlify.app/assets/banner-web-anda.png"
    />
    <meta name="google-site-verification" content="6yUY9_oJhB-6Glba4sAPhN0yxaYQzVfg1YvvY7ERnzQ" />
    <meta name="theme-color" content="#10b981" />

    <!-- LCP image preload — hero portrait lives in /public/ so the URL is stable
         across builds. fetchpriority=high signals this resource is critical. -->
    <link rel="preload" as="image" href="/myfoto.webp" fetchpriority="high" type="image/webp" />

    <!-- Critical inline CSS — paints page shell before bundled CSS loads,
         eliminates FOUC/CLS during the initial 200–400ms. Kept under 1 KiB. -->
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #fafafa;
        color: #18181b;
        min-height: 100vh;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #09090b; color: #fafafa; }
      }
      #app { min-height: 100vh; }
      #home { min-height: 100vh; display: flex; align-items: center; }
    </style>
  </head>

  <body class="font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
